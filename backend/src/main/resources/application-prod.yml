# Production config — all secrets injected via Railway environment variables.
# Safe to commit: contains no real values, only ${VAR} placeholders.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mybatis:
    mapper-locations: classpath:mapper/*.xml
    configuration:
      map-underscore-to-camel-case: true
      # SQL logging disabled in production

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

frontend:
  url: ${FRONTEND_URL}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
